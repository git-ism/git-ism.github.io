<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIT-ISM — Intent Semantic Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       oklch(0.10 0.012 265);
  --bg2:      oklch(0.13 0.012 265);
  --bg3:      oklch(0.16 0.012 265);
  --border:   oklch(0.23 0.012 265);
  --text:     oklch(0.92 0.008 265);
  --muted:    oklch(0.54 0.010 265);

  /* Parent — Violet */
  --violet:       oklch(0.62 0.22 292);
  --violet-dim:   oklch(0.62 0.22 292 / 0.12);
  --violet-glow:  oklch(0.62 0.22 292 / 0.06);

  /* git-semantic — Sky Blue */
  --blue:         oklch(0.70 0.17 222);
  --blue-dim:     oklch(0.70 0.17 222 / 0.12);
  --blue-glow:    oklch(0.70 0.17 222 / 0.07);

  /* git-cognitive — Synthetic Green */
  --green:        oklch(0.76 0.18 148);
  --green-dim:    oklch(0.76 0.18 148 / 0.12);
  --green-glow:   oklch(0.76 0.18 148 / 0.07);

  --display: 'Syne', sans-serif;
  --sans:    'Plus Jakarta Sans', sans-serif;
  --mono:    'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.65;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  border-bottom: 1px solid var(--border);
  background: oklch(0.10 0.012 265 / 0.88);
  backdrop-filter: blur(16px);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--display); font-size: 16px; font-weight: 700;
  color: var(--text); letter-spacing: -0.02em; text-decoration: none;
}
.nav-logo-mark {
  width: 28px; height: 28px;
  border: 1.5px solid var(--violet);
  display: grid; place-items: center;
  position: relative;
}
.nav-logo-mark::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--violet);
  border-radius: 50%;
}
.nav-logo-text { color: var(--text); }
.nav-logo-text span { color: var(--violet); }

.nav-center { display: flex; align-items: center; gap: 8px; }
.nav-tool-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; padding: 5px 14px;
  border: 1px solid var(--border); background: transparent;
  cursor: pointer; transition: all 0.18s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.nav-tool-btn.semantic { color: var(--blue); }
.nav-tool-btn.semantic:hover { border-color: var(--blue); background: var(--blue-dim); }
.nav-tool-btn.cognitive { color: var(--green); }
.nav-tool-btn.cognitive:hover { border-color: var(--green); background: var(--green-dim); }
.nav-divider { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

.nav-right { display: flex; align-items: center; gap: 20px; }
.nav-link {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase;
  transition: color 0.18s;
}
.nav-link:hover { color: var(--text); }
.nav-version {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  border: 1px solid var(--border); padding: 3px 9px; letter-spacing: 0.06em;
}

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 120px 80px 80px;
  position: relative; overflow: hidden; text-align: center;
}
.hero-grid-bg {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 64px 64px;
  opacity: 0.35;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}
.hero-glow {
  position: absolute; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 40%,
    oklch(0.62 0.22 292 / 0.07) 0%,
    transparent 65%);
  pointer-events: none;
}

.hero-content { position: relative; z-index: 1; max-width: 860px; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--violet); margin-bottom: 36px;
}
.hero-eyebrow::before,
.hero-eyebrow::after {
  content: ''; width: 32px; height: 1px; background: var(--violet);
  opacity: 0.5;
}

.hero-title {
  font-family: var(--display);
  font-size: clamp(48px, 7vw, 90px);
  font-weight: 800;
  line-height: 0.95;
  letter-spacing: -0.04em;
  color: var(--text);
  margin-bottom: 32px;
}
.hero-title em { font-style: normal; }
.hero-title .line-semantic { color: var(--blue); }
.hero-title .line-cognitive { color: var(--green); }

.hero-sub {
  font-size: 18px; color: var(--muted); line-height: 1.7;
  max-width: 560px; margin: 0 auto 56px;
  font-weight: 400;
}
.hero-sub strong { color: var(--text); font-weight: 500; }

.hero-ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 80px; }
.cta-primary {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 13px 28px; border: none; cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  text-decoration: none; transition: opacity 0.18s;
}
.cta-primary.semantic { background: var(--blue); color: var(--bg); }
.cta-primary.cognitive { background: var(--green); color: var(--bg); }
.cta-primary:hover { opacity: 0.85; }
.cta-secondary {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 13px 28px; border: 1px solid var(--border); background: transparent;
  cursor: pointer; color: var(--muted); display: inline-flex; align-items: center; gap: 8px;
  text-decoration: none; transition: all 0.18s;
}
.cta-secondary:hover { color: var(--text); border-color: var(--muted); }

/* hero tools preview strip */
.hero-tools-strip {
  display: flex; gap: 1px; background: var(--border);
  border: 1px solid var(--border);
  width: 100%; max-width: 840px; margin: 0 auto;
}
.hero-strip-col {
  flex: 1; background: var(--bg2);
  padding: 24px 28px;
}
.strip-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.strip-label.semantic { color: var(--blue); }
.strip-label.cognitive { color: var(--green); }
.strip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.strip-cmd { font-family: var(--mono); font-size: 12px; color: var(--text); }
.strip-cmd .prompt { color: var(--muted); }
.strip-output { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.8; }
.strip-output .hi { color: var(--text); }
.strip-output .blue { color: var(--blue); }
.strip-output .green { color: var(--green); }

/* ── TOOLS ── */
.tools {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  border-top: 1px solid var(--border);
}
.tool-card {
  background: var(--bg);
  padding: 72px 64px;
  position: relative; overflow: hidden;
}
.tool-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.tool-card.semantic::before { background: var(--blue); }
.tool-card.cognitive::before { background: var(--green); }

.tool-card-bg {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
}
.tool-card.semantic .tool-card-bg {
  background: radial-gradient(ellipse 70% 50% at 100% 0%, var(--blue-glow) 0%, transparent 70%);
}
.tool-card.cognitive .tool-card-bg {
  background: radial-gradient(ellipse 70% 50% at 0% 100%, var(--green-glow) 0%, transparent 70%);
}

.tool-card-inner { position: relative; z-index: 1; }

.tool-badge {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 12px; margin-bottom: 32px;
  border: 1px solid;
}
.tool-badge.semantic { color: var(--blue); border-color: oklch(0.70 0.17 222 / 0.4); background: var(--blue-dim); }
.tool-badge.cognitive { color: var(--green); border-color: oklch(0.76 0.18 148 / 0.4); background: var(--green-dim); }

.tool-title {
  font-family: var(--display); font-size: 36px; font-weight: 800;
  letter-spacing: -0.03em; line-height: 1; margin-bottom: 6px;
}
.tool-subtitle {
  font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 24px;
  letter-spacing: 0.04em;
}
.tool-desc {
  font-size: 15px; color: var(--muted); line-height: 1.75;
  max-width: 440px; margin-bottom: 40px;
}
.tool-desc strong { color: var(--text); font-weight: 500; }

/* mini terminal */
.mini-term {
  background: var(--bg2); border: 1px solid var(--border);
  margin-bottom: 40px; overflow: hidden;
}
.mini-term-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 14px; background: var(--bg3); border-bottom: 1px solid var(--border);
}
.mt-dot { width: 8px; height: 8px; border-radius: 50%; }
.mini-term-body { padding: 18px 20px; font-family: var(--mono); font-size: 12px; line-height: 1.9; }
.mt-prompt { color: var(--muted); }

.tool-stats { display: flex; gap: 36px; margin-bottom: 40px; }
.tool-stat-val {
  font-family: var(--display); font-size: 28px; font-weight: 800;
  letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px;
}
.tool-stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }

.tool-cta {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 11px 24px; cursor: pointer; border: none;
  display: inline-flex; align-items: center; gap: 8px;
  text-decoration: none; transition: opacity 0.18s;
}
.tool-cta.semantic { background: var(--blue); color: var(--bg); }
.tool-cta.cognitive { background: var(--green); color: var(--bg); }
.tool-cta:hover { opacity: 0.82; }
.tool-cta-ghost {
  font-family: var(--mono); font-size: 12px; font-weight: 400;
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--muted); text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 20px; transition: color 0.18s;
}
.tool-cta-ghost:hover { color: var(--text); }

/* ── PRINCIPLE ── */
.principle {
  padding: 100px 80px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.principle-inner {
  max-width: 1100px; margin: 0 auto;
}
.section-label {
  font-family: var(--mono); font-size: 11px; color: var(--violet);
  letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}
.section-label::after {
  content: ''; width: 40px; height: 1px; background: oklch(0.62 0.22 292 / 0.4);
}
.principle h2 {
  font-family: var(--display); font-size: clamp(32px, 3.5vw, 52px);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1.05;
  margin-bottom: 60px;
}
.principle-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
}
.principle-item {
  background: var(--bg2); padding: 40px 36px;
}
.principle-item-icon {
  width: 36px; height: 36px; margin-bottom: 20px;
  border: 1px solid var(--violet);
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 16px; color: var(--violet);
}
.principle-item h3 {
  font-family: var(--display); font-size: 18px; font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 10px;
}
.principle-item p {
  font-size: 14px; color: var(--muted); line-height: 1.75;
}
.principle-item p code {
  font-family: var(--mono); font-size: 12px; color: var(--violet);
  background: var(--violet-dim); padding: 1px 5px;
}

/* ── DIAGRAM ── */
.diagram {
  padding: 100px 80px; border-top: 1px solid var(--border);
}
.diagram-inner { max-width: 1100px; margin: 0 auto; }
.diagram h2 {
  font-family: var(--display); font-size: clamp(28px, 3vw, 44px);
  font-weight: 800; letter-spacing: -0.03em; margin-bottom: 60px;
}
.diagram-flow {
  display: grid; grid-template-columns: 1fr 40px 1fr 40px 1fr;
  gap: 0; align-items: start;
}
.flow-node {
  border: 1px solid var(--border); background: var(--bg2); padding: 28px 24px;
}
.flow-node-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
}
.flow-node h4 {
  font-family: var(--display); font-size: 18px; font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 8px;
}
.flow-node p { font-size: 13px; color: var(--muted); line-height: 1.7; }
.flow-arrow {
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 50px; color: var(--border); font-size: 18px;
}
.flow-node.semantic { border-color: oklch(0.70 0.17 222 / 0.4); }
.flow-node.semantic .flow-node-label { color: var(--blue); }
.flow-node.cognitive { border-color: oklch(0.76 0.18 148 / 0.4); }
.flow-node.cognitive .flow-node-label { color: var(--green); }
.flow-node.shared { border-color: oklch(0.62 0.22 292 / 0.4); }
.flow-node.shared .flow-node-label { color: var(--violet); }

/* ── STATS BAR ── */
.stats-bar {
  border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--border); gap: 1px;
}
.stat-cell {
  background: var(--bg); padding: 40px 48px;
  display: flex; flex-direction: column; gap: 6px;
}
.stat-cell-val {
  font-family: var(--display); font-size: 40px; font-weight: 800;
  letter-spacing: -0.04em; line-height: 1;
}
.stat-cell-val.violet { color: var(--violet); }
.stat-cell-val.blue { color: var(--blue); }
.stat-cell-val.green { color: var(--green); }
.stat-cell-label {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  letter-spacing: 0.07em; text-transform: uppercase;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 48px 80px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-logo {
  font-family: var(--display); font-size: 15px; font-weight: 700;
  letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px;
}
.footer-logo-mark {
  width: 20px; height: 20px;
  border: 1.5px solid var(--violet);
  display: grid; place-items: center;
}
.footer-logo-mark::before {
  content: ''; width: 5px; height: 5px;
  background: var(--violet); border-radius: 50%;
}
.footer-links { display: flex; gap: 28px; }
.footer-links a {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  text-decoration: none; letter-spacing: 0.05em; transition: color 0.18s;
}
.footer-links a:hover { color: var(--text); }
.footer-copy { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* reveal */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.55s ease, transform 0.55s ease; }
.reveal.visible { opacity: 1; transform: none; }

@media (max-width: 960px) {
  nav { padding: 0 24px; }
  .nav-center { display: none; }
  .hero { padding: 100px 32px 60px; }
  .hero-tools-strip { flex-direction: column; }
  .tools { grid-template-columns: 1fr; }
  .tool-card { padding: 48px 32px; }
  .principle, .diagram { padding: 64px 32px; }
  .principle-grid { grid-template-columns: 1fr; }
  .diagram-flow { grid-template-columns: 1fr; }
  .flow-arrow { display: none; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  footer { flex-direction: column; gap: 24px; text-align: center; padding: 40px 32px; }
}
</style>
</head>

<nav>

    <div class="nav-logo-mark"></div>
    <span class="nav-logo-text">GIT<span>-ISM</span></span>

  <div class="nav-center">
    <a class="nav-tool-btn semantic" href="git-semantic.html">⬡ git-semantic</a>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

// Animated counter
function Counter({ to, suffix = '' }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const triggered = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !triggered.current) {
        triggered.current = true;
        let start = 0;
        const step = () => {
          start += Math.ceil(to / 30);
          if (start >= to) { setVal(to); return; }
          setVal(start);
          requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [to]);
  return <span ref={ref}>{val}{suffix}</span>;
}

function App() {
  useReveal();

  return (
    <>
      {/* ── HERO ── */}
      <section className="hero">
        <div className="hero-grid-bg"></div>
        <div className="hero-glow"></div>
        <div className="hero-content">
          <div className="hero-eyebrow">Intent Semantic Management</div>
          <h1 className="hero-title">
            <span className="line-semantic">Semantic.</span><br />
            <span className="line-cognitive">Cognitive.</span><br />
            <span style={{color:'var(--text)'}}>Intelligent.</span>
          </h1>
          <p className="hero-sub">
            Two tools. One discipline. <strong>git-semantic</strong> gives your AI agents precise, token-efficient code search.{' '}
            <strong>git-cognitive</strong> tracks every AI-generated commit as measurable debt.
          </p>
          <div className="hero-ctas">
            <a className="cta-primary semantic" href="git-semantic.html">
              ⬡ git-semantic →
            </a>
            <a className="cta-primary cognitive" href="git-cognitive.html">
              ◎ git-cognitive →
            </a>
            <a className="cta-secondary" href="https://github.com/ccherrad" target="_blank" rel="noopener">
              GitHub ↗
            </a>
          </div>

          <div className="hero-tools-strip reveal">
            <div className="hero-strip-col">
              <div className="strip-label semantic">
                <span className="strip-dot"></span>git-semantic
              </div>
              <div className="strip-cmd">
                <span className="prompt">❯ </span>git-semantic grep "how incoming requests are validated"
              </div>
              <div className="strip-output">
                <div><span className="blue">src/middleware/auth.rs:14</span> → <span className="hi">validate_token()</span></div>
                <div><span className="blue">src/routes/api.rs:88</span> → <span className="hi">RequestGuard impl</span></div>
                <div style={{color:'var(--muted)', marginTop:4}}>47% fewer tokens · 32% fewer turns</div>
              </div>
            </div>
            <div className="hero-strip-col" style={{borderLeft:'1px solid var(--border)'}}>
              <div className="strip-label cognitive">
                <span className="strip-dot"></span>git-cognitive
              </div>
              <div className="strip-cmd">
                <span className="prompt">❯ </span>git-cognitive debt
              </div>
              <div className="strip-output">
                <div><span className="green">a3f8c2d</span> <span style={{color:'var(--red, oklch(0.65 0.20 25))'}}>risk</span> 0.87 · 82% AI · payment flow</div>
                <div><span className="green">b9e1a04</span> <span style={{color:'oklch(0.78 0.18 72)'}}>tech_debt</span> 0.61 · 71% AI · auth rewrite</div>
                <div style={{color:'var(--muted)', marginTop:4}}>2 unendorsed · 0 zombies</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ── TOOLS ── */}
      <div className="tools">
        {/* git-semantic */}
        <div className="tool-card semantic">
          <div className="tool-card-bg"></div>
          <div className="tool-card-inner">
            <div className="tool-badge semantic">⬡ git-semantic</div>
            <h2 className="tool-title" style={{fontFamily:'var(--display)'}}>Semantic grep<br/>for your codebase.</h2>
            <div className="tool-subtitle">cargo install gitsem · Rust · MIT / Apache-2.0</div>
            <p className="tool-desc">
              Parses every tracked file with tree-sitter, generates vector embeddings per chunk, and stores them on a dedicated <strong>orphan git branch</strong> — so the whole team shares embeddings without re-indexing. Replace keyword grep with semantic search inside Claude Code.
            </p>

            <div className="mini-term reveal">
              <div className="mini-term-bar">
                <div className="mt-dot" style={{background:'oklch(0.65 0.20 25)'}}></div>
                <div className="mt-dot" style={{background:'oklch(0.78 0.18 72)'}}></div>
                <div className="mt-dot" style={{background:'var(--blue)'}}></div>
                <span style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', marginLeft:8}}>~/project — zsh</span>
              </div>
              <div className="mini-term-body">
                <div><span className="mt-prompt" style={{color:'var(--blue)'}}>❯ </span><span style={{color:'var(--text)'}}>git-semantic enable claude</span></div>
                <div style={{color:'var(--muted)'}}>✓ hooks installed → .claude/hooks/</div>
                <div style={{color:'var(--muted)'}}>✓ CLAUDE.md updated</div>
                <div style={{marginTop:8}}><span className="mt-prompt" style={{color:'var(--blue)'}}>❯ </span><span style={{color:'var(--text)'}}>git-semantic grep "error propagation async"</span></div>
                <div style={{color:'var(--blue)'}}>src/embed.rs:42 → EmbedError::Provider(..)</div>
                <div style={{color:'var(--muted)', fontSize:11}}>1 chunk · 340 tokens (vs 4,200 grep baseline)</div>
              </div>
            </div>

            <div className="tool-stats reveal">
              <div>
                <div className="tool-stat-val" style={{color:'var(--blue)'}}><Counter to={32} suffix="%" /></div>
                <div className="tool-stat-label">fewer tokens</div>
              </div>
              <div>
                <div className="tool-stat-val" style={{color:'var(--blue)'}}><Counter to={24} suffix="%" /></div>
                <div className="tool-stat-label">fewer turns</div>
              </div>
              <div>
                <div className="tool-stat-val" style={{color:'var(--blue)'}}>2.5×</div>
                <div className="tool-stat-label">waste ratio</div>
              </div>
            </div>

            <div>
              <a className="tool-cta semantic" href="git-semantic.html">
                Explore git-semantic →
              </a>
              <a className="tool-cta-ghost" href="https://github.com/ccherrad/git-semantic" target="_blank" rel="noopener">
                GitHub ↗
              </a>
            </div>
          </div>
        </div>

        {/* git-cognitive */}
        <div className="tool-card cognitive">
          <div className="tool-card-bg"></div>
          <div className="tool-card-inner">
            <div className="tool-badge cognitive">◎ git-cognitive</div>
            <h2 className="tool-title" style={{fontFamily:'var(--display)'}}>Cognitive debt<br/>made visible.</h2>
            <div className="tool-subtitle">cargo install git-cognitive · Rust · MIT / Apache-2.0</div>
            <p className="tool-desc">
              Every AI-generated commit is attributed, friction-scored, and classified — stored directly in your <strong>git repo</strong> on an orphan branch. No LLM calls. No external services. Pure git signals and tree-sitter AST analysis.
            </p>

            <div className="mini-term reveal">
              <div className="mini-term-bar">
                <div className="mt-dot" style={{background:'oklch(0.65 0.20 25)'}}></div>
                <div className="mt-dot" style={{background:'oklch(0.78 0.18 72)'}}></div>
                <div className="mt-dot" style={{background:'var(--green)'}}></div>
                <span style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', marginLeft:8}}>~/project — zsh</span>
              </div>
              <div className="mini-term-body">
                <div><span className="mt-prompt" style={{color:'var(--green)'}}>❯ </span><span style={{color:'var(--text)'}}>git-cognitive audit --check-zombies</span></div>
                <div style={{color:'oklch(0.65 0.20 25)'}}>⚠ 3 zombie commits detected</div>
                <div style={{color:'var(--muted)'}}>a3f8c2d · 47 days · 82% AI · unendorsed</div>
                <div style={{marginTop:8}}><span className="mt-prompt" style={{color:'var(--green)'}}>❯ </span><span style={{color:'var(--text)'}}>git-cognitive endorse</span></div>
                <div style={{color:'var(--green)'}}>✓ a3f8c2d endorsed · pushed to cognitive-debt/v1</div>
              </div>
            </div>

            <div className="tool-stats reveal">
              <div>
                <div className="tool-stat-val" style={{color:'var(--green)'}}>0</div>
                <div className="tool-stat-label">LLM calls</div>
              </div>
              <div>
                <div className="tool-stat-val" style={{color:'var(--green)'}}>3</div>
                <div className="tool-stat-label">friction signals</div>
              </div>
              <div>
                <div className="tool-stat-val" style={{color:'var(--green)'}}>git</div>
                <div className="tool-stat-label">only storage</div>
              </div>
            </div>

            <div>
              <a className="tool-cta cognitive" href="git-cognitive.html">
                Explore git-cognitive →
              </a>
              <a className="tool-cta-ghost" href="https://github.com/ccherrad/git-cognitive" target="_blank" rel="noopener">
                GitHub ↗
              </a>
            </div>
          </div>
        </div>
      </div>

      {/* ── PRINCIPLES ── */}
      <section className="principle">
        <div className="principle-inner">
          <div className="section-label">Shared architecture</div>
          <h2 className="reveal">
            Built on the same<br />three principles.
          </h2>
          <div className="principle-grid reveal">
            {[
              {
                icon: '⎇',
                title: 'Git is the store',
                body: <>Both tools write to dedicated orphan branches (<code>semantic</code>, <code>cognitive-debt/v1</code>). No external databases, no cloud sync, no SaaS dependency. Your repo is the source of truth.</>,
              },
              {
                icon: '◈',
                title: 'Tree-sitter for precision',
                body: 'Both tools parse code at the AST level — not with heuristics or regex. Chunk boundaries, complexity deltas, and doc gaps are computed from real syntax trees.',
              },
              {
                icon: '⊛',
                title: 'Claude Code native',
                body: <>Both tools integrate via <code>enable claude</code> — installing hooks and injecting CLAUDE.md instructions that enforce behavior across subagents, not just sessions.</>,
              },
            ].map(p => (
              <div key={p.title} className="principle-item">
                <div className="principle-item-icon">{p.icon}</div>
                <h3>{p.title}</h3>
                <p>{p.body}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── DIAGRAM ── */}
      <section className="diagram">
        <div className="diagram-inner">
          <div className="section-label">How they work together</div>
          <h2 className="reveal">
            Search intelligently.<br/>Audit honestly.
          </h2>
          <div className="diagram-flow reveal">
            <div className="flow-node shared">
              <div className="flow-node-label">Input</div>
              <h4>Your git repo</h4>
              <p>Tracked files, commit history, Claude Code sessions. Everything starts here.</p>
            </div>
            <div className="flow-arrow">→</div>
            <div style={{display:'flex', flexDirection:'column', gap:1, background:'var(--border)'}}>
              <div className="flow-node semantic" style={{flex:1}}>
                <div className="flow-node-label">⬡ git-semantic</div>
                <h4>Index + Search</h4>
                <p>tree-sitter chunks → embeddings → <code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--blue)'}}>semantic</code> branch. Agents search semantically.</p>
              </div>
              <div className="flow-node cognitive" style={{flex:1}}>
                <div className="flow-node-label">◎ git-cognitive</div>
                <h4>Audit + Score</h4>
                <p>post-commit hook → AI attribution + friction score → <code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--green)'}}>cognitive-debt/v1</code>.</p>
              </div>
            </div>
            <div className="flow-arrow">→</div>
            <div className="flow-node shared">
              <div className="flow-node-label">Output</div>
              <h4>Intelligence in git</h4>
              <p>Shared with the whole team via <code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--violet)'}}>git push</code>. No extra infrastructure required.</p>
            </div>
          </div>
        </div>
      </section>

      {/* ── STATS ── */}
      <div className="stats-bar">
        {[
          { val: 32, suffix: '%', label: 'fewer tokens with semantic search', cls: 'blue' },
          { val: 24, suffix: '%', label: 'fewer agent turns', cls: 'blue' },
          { val: 0, suffix: '', label: 'LLM calls for cognitive audit', cls: 'green', static: '0' },
          { val: 2, suffix: '', label: 'tools. one discipline.', cls: 'violet', static: '2' },
        ].map(s => (
          <div key={s.label} className="stat-cell">
            <div className={`stat-cell-val ${s.cls}`}>
              {s.static !== undefined ? s.static : <Counter to={s.val} suffix={s.suffix} />}
            </div>
            <div className="stat-cell-label">{s.label}</div>
          </div>
        ))}
      </div>

      {/* ── FOOTER ── */}
      <footer>
        <div className="footer-logo">
          <div className="footer-logo-mark"></div>
          GIT-ISM
        </div>
        <div className="footer-links">
          <a href="git-semantic.html">git-semantic →</a>
          <a href="git-cognitive.html">git-cognitive →</a>
          <a href="https://github.com/ccherrad" target="_blank" rel="noopener">GitHub</a>
        </div>
        <div className="footer-copy">MIT OR Apache-2.0</div>
      </footer>
    </>
  );
}

</script>
