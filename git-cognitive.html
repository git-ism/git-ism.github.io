<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>git-cognitive — GIT-ISM Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          oklch(0.10 0.012 245);
  --bg2:         oklch(0.13 0.012 245);
  --bg3:         oklch(0.16 0.012 245);
  --border:      oklch(0.22 0.012 245);
  --text:        oklch(0.92 0.008 245);
  --muted:       oklch(0.54 0.010 245);
  --green:       oklch(0.76 0.18 148);
  --green-dim:   oklch(0.76 0.18 148 / 0.12);
  --green-border:oklch(0.76 0.18 148 / 0.35);
  --green-glow:  oklch(0.76 0.18 148 / 0.06);
  --amber:       oklch(0.78 0.18 72);
  --amber-dim:   oklch(0.78 0.18 72 / 0.12);
  --red:         oklch(0.65 0.20 25);
  --red-dim:     oklch(0.65 0.20 25 / 0.12);
  --blue:        oklch(0.70 0.17 222);
  --violet:      oklch(0.62 0.22 292);
  --violet-dim:  oklch(0.62 0.22 292 / 0.12);
  --mono:    'JetBrains Mono', monospace;
  --sans:    'Plus Jakarta Sans', sans-serif;
  --display: 'Syne', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.65;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── SUITE BAR ── */
.suite-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 101;
  height: 32px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  background: var(--violet-dim);
  border-bottom: 1px solid oklch(0.62 0.22 292 / 0.25);
}
.suite-bar-left {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
}
.suite-bar-logo {
  color: var(--violet); font-weight: 600; text-decoration: none;
  display: flex; align-items: center; gap: 6px; text-transform: uppercase;
}
.suite-bar-logo-mark {
  width: 14px; height: 14px; border: 1px solid var(--violet);
  display: grid; place-items: center;
}
.suite-bar-logo-mark::before {
  content: ''; width: 4px; height: 4px;
  background: var(--violet); border-radius: 50%;
}
.suite-bar-sep { color: var(--muted); }
.suite-bar-tool {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  color: var(--muted); text-decoration: none; text-transform: uppercase;
  transition: color 0.18s;
}
.suite-bar-tool:hover { color: var(--text); }
.suite-bar-tool.active { color: var(--green); }
.suite-bar-right { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }

/* ── NAV ── */
nav {
  position: fixed; top: 32px; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 56px;
  border-bottom: 1px solid var(--border);
  background: oklch(0.10 0.012 245 / 0.93);
  backdrop-filter: blur(12px);
}
.nav-logo {
  font-family: var(--mono); font-size: 14px; font-weight: 600;
  color: var(--green); letter-spacing: -0.02em; text-decoration: none;
}
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase;
  transition: color 0.18s;
}
.nav-links a:hover { color: var(--text); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-install {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em; padding: 7px 18px;
  background: var(--green); color: var(--bg);
  border: none; cursor: pointer; text-decoration: none;
  transition: opacity 0.18s; display: inline-block;
}
.nav-install:hover { opacity: 0.85; }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; padding-top: 88px; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 80% 50%, var(--green-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero-left {
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 64px 80px 80px;
  border-right: 1px solid var(--border);
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--green-border);
  background: var(--green-dim);
  padding: 5px 12px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--green); letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 32px; width: fit-content;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.hero-title {
  font-family: var(--display);
  font-size: clamp(36px, 4vw, 58px);
  font-weight: 700; line-height: 1.05;
  letter-spacing: -0.03em; color: var(--text);
  margin-bottom: 24px;
}
.hero-title em { font-style: normal; color: var(--green); }
.hero-sub { font-size: 17px; color: var(--muted); line-height: 1.7; max-width: 440px; margin-bottom: 48px; }
.hero-sub strong { color: var(--text); font-weight: 500; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 56px; }
.btn-primary {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 13px 28px; background: var(--green); color: var(--bg);
  border: none; cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: opacity 0.18s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 13px 28px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.18s;
}
.btn-secondary:hover { color: var(--text); border-color: var(--muted); }
.hero-stats { display: flex; gap: 40px; }
.stat { display: flex; flex-direction: column; gap: 4px; }
.stat-val { font-family: var(--display); font-size: 28px; font-weight: 800; letter-spacing: -0.03em; color: var(--green); }
.stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

.hero-right {
  display: flex; align-items: center; justify-content: center;
  padding: 80px 64px;
  background: var(--bg2);
}

/* ── TERMINAL ── */
.terminal-wrap { width: 100%; max-width: 520px; }
.terminal {
  background: var(--bg); border: 1px solid var(--border);
  overflow: hidden;
}
.terminal-header {
  display: flex; align-items: center; gap: 7px;
  padding: 12px 16px; background: var(--bg3); border-bottom: 1px solid var(--border);
}
.t-dot { width: 10px; height: 10px; border-radius: 50%; }
.t-title { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 6px; }
.terminal-body { padding: 24px; font-family: var(--mono); font-size: 12.5px; line-height: 1.9; }
.t-prompt { color: var(--green); }
.t-cursor {
  display: inline-block; width: 7px; height: 13px;
  background: var(--green); vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── SECTIONS ── */
section {
  padding: 100px 80px;
  border-top: 1px solid var(--border);
  max-width: 100%;
}
.section-inner { max-width: 1100px; margin: 0 auto; }
.section-label {
  font-family: var(--mono); font-size: 11px; color: var(--green);
  letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}
.section-label::after { content: ''; width: 40px; height: 1px; background: var(--green-border); }
.section-h2 {
  font-family: var(--display); font-size: clamp(28px, 3.5vw, 48px);
  font-weight: 800; letter-spacing: -0.03em; line-height: 1.05;
  margin-bottom: 20px;
}
.section-sub { font-size: 16px; color: var(--muted); max-width: 600px; line-height: 1.7; margin-bottom: 60px; }

/* ── HOW IT WORKS steps ── */
.steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
.step { background: var(--bg2); padding: 36px 32px; }
.step-num { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 16px; }
.step-icon { font-size: 22px; margin-bottom: 16px; color: var(--green); }
.step h3 { font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
.step p { font-size: 14px; color: var(--muted); line-height: 1.7; }
.step code { font-family: var(--mono); font-size: 12px; color: var(--green); background: var(--green-dim); padding: 1px 5px; }
.step-cmd { font-family: var(--mono); font-size: 12px; color: var(--green); background: var(--bg); border: 1px solid var(--border); padding: 10px 14px; margin-top: 20px; }
.step-cmd .prompt { color: var(--muted); }

/* ── CLASSIFICATION badges ── */
.classes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
.class-card { background: var(--bg2); padding: 32px; }
.class-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; padding: 4px 10px; margin-bottom: 16px;
  border: 1px solid;
}
.class-badge.risk { color: var(--red); border-color: oklch(0.65 0.20 25 / 0.4); background: var(--red-dim); }
.class-badge.tech-debt { color: var(--amber); border-color: oklch(0.78 0.18 72 / 0.4); background: var(--amber-dim); }
.class-badge.feature { color: var(--blue); border-color: oklch(0.70 0.17 222 / 0.35); background: oklch(0.70 0.17 222 / 0.12); }
.class-badge.bug-fix { color: var(--green); border-color: var(--green-border); background: var(--green-dim); }
.class-badge.refactor { color: var(--muted); border-color: var(--border); background: var(--bg3); }
.class-badge.minor { color: var(--muted); border-color: var(--border); background: var(--bg3); }
.class-card h3 { font-family: var(--display); font-size: 16px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
.class-card p { font-size: 13px; color: var(--muted); line-height: 1.7; }

/* ── FRICTION signals ── */
.signals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin-bottom: 40px; }
.signal-card { background: var(--bg2); padding: 40px 36px; }
.signal-icon { font-size: 20px; color: var(--green); margin-bottom: 16px; }
.signal-card h3 { font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
.signal-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* ── COMMANDS explorer ── */
.cmd-grid { display: grid; grid-template-columns: 220px 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); }
.cmd-list { background: var(--bg2); }
.cmd-item { padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.14s; }
.cmd-item:hover { background: var(--bg3); }
.cmd-item.active { background: var(--bg); border-left: 2px solid var(--green); }
.cmd-item.active .cmd-name { color: var(--green); }
.cmd-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.cmd-short { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.cmd-detail { background: var(--bg); padding: 36px 40px; }
.cmd-usage { font-family: var(--mono); font-size: 14px; color: var(--text); margin-bottom: 20px; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); }
.cmd-usage::before { content: '$ '; color: var(--muted); }
.cmd-desc { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 24px; }
.cmd-flags { display: flex; flex-direction: column; gap: 10px; }
.cmd-flag { display: flex; gap: 16px; font-family: var(--mono); font-size: 12px; }
.flag-name { color: var(--green); min-width: 200px; }
.flag-desc { color: var(--muted); }

/* ── INSTALL ── */
.install-block {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border: 1px solid var(--border);
  padding: 20px 28px; font-family: var(--mono); font-size: 15px;
  margin-bottom: 16px;
}
.install-block .prompt { color: var(--muted); margin-right: 10px; }
.install-block .cmd { color: var(--green); }
.copy-btn {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--bg3); border: 1px solid var(--border);
  padding: 5px 12px; cursor: pointer; letter-spacing: 0.04em;
  transition: all 0.18s;
}
.copy-btn:hover { color: var(--text); border-color: var(--muted); }
.install-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 48px; }
.qs-step { display: flex; gap: 16px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid var(--border); }
.qs-num { font-family: var(--mono); font-size: 12px; color: var(--green); min-width: 24px; }
.qs-cmd { font-family: var(--mono); font-size: 13px; color: var(--text); margin-bottom: 4px; }
.qs-desc { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* ── mini terminal ── */
.mini-term { background: var(--bg2); border: 1px solid var(--border); overflow: hidden; }
.mini-term-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 14px; background: var(--bg3); border-bottom: 1px solid var(--border);
}
.mini-term-body { padding: 18px 20px; font-family: var(--mono); font-size: 12px; line-height: 1.9; }

/* ── workflow table ── */
.workflow-table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
.workflow-table th { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid var(--border); text-align: left; }
.workflow-table td { padding: 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.wf-step { font-family: var(--mono); font-size: 12px; font-weight: 600; }
.wf-step.commit { color: var(--green); }
.wf-step.score { color: var(--amber); }
.wf-step.endorse { color: var(--blue); }
.wf-step.watch { color: var(--muted); }
.wf-cmd { font-family: var(--mono); font-size: 12px; color: var(--text); }
.wf-when { font-size: 13px; color: var(--muted); }
.wf-badge { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; padding: 3px 10px; white-space: nowrap; }
.wf-badge.auto { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
.wf-badge.manual { background: oklch(0.70 0.17 222 / 0.12); color: var(--blue); border: 1px solid oklch(0.70 0.17 222 / 0.35); }
.wf-badge.ci { background: var(--amber-dim); color: var(--amber); border: 1px solid oklch(0.78 0.18 72 / 0.3); }

/* ── diff table ── */
.diff-table { width: 100%; border-collapse: collapse; }
.diff-table th { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 20px; text-align: left; }
.diff-table th.us { color: var(--green); background: var(--green-dim); border: 1px solid var(--green-border); }
.diff-table th.them { color: var(--muted); background: var(--bg2); border: 1px solid var(--border); }
.diff-table td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--border); }
.diff-table td.us { border-left: 1px solid var(--green-border); border-right: 1px solid var(--green-border); }
.diff-table td.them { border-right: 1px solid var(--border); }
.diff-check { color: var(--green); margin-right: 6px; }
.diff-cross { color: var(--muted); margin-right: 6px; }

/* ── features grid ── */
.features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
.feature-card { background: var(--bg2); padding: 40px 36px; }
.feature-icon { font-size: 20px; color: var(--green); margin-bottom: 16px; }
.feature-card h3 { font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
.feature-card p { font-size: 14px; color: var(--muted); line-height: 1.75; }
.feature-card code { font-family: var(--mono); font-size: 12px; color: var(--green); background: var(--green-dim); padding: 1px 5px; }

/* ── footer ── */
footer {
  border-top: 1px solid var(--border);
  padding: 48px 80px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-links { display: flex; gap: 28px; }
.footer-links a { font-family: var(--mono); font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; transition: color 0.18s; }
.footer-links a:hover { color: var(--text); }

/* reveal */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.55s ease, transform 0.55s ease; }
.reveal.visible { opacity: 1; transform: none; }

@media (max-width: 960px) {
  nav { padding: 0 24px; top: 28px; }
  .suite-bar { padding: 0 24px; }
  .hero { grid-template-columns: 1fr; }
  .hero-right { display: none; }
  .hero-left { padding: 60px 32px; }
  section { padding: 64px 32px; }
  .steps { grid-template-columns: 1fr; }
  .classes-grid { grid-template-columns: 1fr; }
  .signals-grid { grid-template-columns: 1fr; }
  .features-grid { grid-template-columns: 1fr; }
  .install-grid { grid-template-columns: 1fr; }
  .cmd-grid { grid-template-columns: 1fr; }
  footer { flex-direction: column; gap: 24px; text-align: center; padding: 40px 32px; }
}
</style>
</head>

<!-- SUITE BAR -->
<div class="suite-bar">
  <div class="suite-bar-left">
    <a class="suite-bar-logo" href="index.html">
      <div class="suite-bar-logo-mark"></div>
      GIT-ISM
    </a>
    <span class="suite-bar-sep">/</span>
    <a class="suite-bar-tool" href="git-semantic.html">git-semantic</a>

  </div>

</div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">◎ git-cognitive</a>
  <div class="nav-links">
    <a href="#how" onclick="document.getElementById('how').scrollIntoView({behavior:'smooth'});return false;">How it works</a>
    <a href="#workflow" onclick="document.getElementById('workflow').scrollIntoView({behavior:'smooth'});return false;">Workflow</a>
    <a href="#commands" onclick="document.getElementById('commands').scrollIntoView({behavior:'smooth'});return false;">Commands</a>
    <a href="#install" onclick="document.getElementById('install').scrollIntoView({behavior:'smooth'});return false;">Install</a>
  </div>

  </div>
</nav>

<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1800); };
  return <button className="copy-btn" onClick={copy}>{copied ? '✓ copied' : 'copy'}</button>;
}

// ── Animated terminal ─────────────────────────────────
const PHASES = [
  {
    cmd: 'git-cognitive index HEAD',
    output: [
      { text: 'Attributing lines...', color: 'var(--muted)' },

function Terminal() {
  const [phase, setPhase] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [showOutput, setShowOutput] = useState(false);
  const [showHistory, setShowHistory] = useState([]);

  useEffect(() => {
    const current = PHASES[phase];
    if (charIdx < current.cmd.length) {
      const t = setTimeout(() => setCharIdx(c => c + 1), 38);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => setShowOutput(true), 300);
    return () => clearTimeout(t);
  }, [phase, charIdx]);

  useEffect(() => {
    if (!showOutput) return;
    const t = setTimeout(() => {
      setShowHistory(h => [...h, phase]);
      const next = (phase + 1) % PHASES.length;
      if (next === 0) {
        setTimeout(() => {
          setShowHistory([]);
          setPhase(0); setCharIdx(0); setShowOutput(false);
        }, 1200);
      } else {
        setPhase(next); setCharIdx(0); setShowOutput(false);
      }
    }, 2600);
    return () => clearTimeout(t);
  }, [showOutput]);

  return (
    <div className="terminal">
      <div className="terminal-header">
        <div className="t-dot" style={{background:'var(--red)'}}></div>
        <div className="t-dot" style={{background:'var(--amber)'}}></div>
        <div className="t-dot" style={{background:'var(--green)'}}></div>
        <span className="t-title">~/myproject — zsh</span>
      </div>
      <div className="terminal-body">
        {showHistory.map(i => (
          <div key={i} style={{marginBottom:12}}>
            <div><span className="t-prompt">❯ </span><span style={{color:'var(--text)'}}>{PHASES[i].cmd}</span></div>
            {PHASES[i].output.map((o, j) => <div key={j} style={{color: o.color}}>{o.text}</div>)}
          </div>
        ))}
        <div>
          <span className="t-prompt">❯ </span>
          <span style={{color:'var(--text)'}}>{PHASES[phase].cmd.slice(0, charIdx)}</span>
          {!showOutput && <span className="t-cursor"></span>}
        </div>
        {showOutput && PHASES[phase].output.map((o, i) => (
          <div key={i} style={{color: o.color}}>{o.text}</div>
        ))}
        {showOutput && <div style={{marginTop:8}}><span className="t-prompt">❯ </span><span className="t-cursor"></span></div>}
      </div>
    </div>
  );
}
